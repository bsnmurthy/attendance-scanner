<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barcode Attendance Scanner</title>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f6f9;
      text-align: center;
    }

    .container {
      max-width: 550px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    h1 {
      color: #1a73e8;
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      margin-bottom: 18px;
      color: #333;
      font-size: 18px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
    }

    .start-btn {
      background: #1a73e8;
    }

    .start-btn:hover {
      background: #0f5bd3;
    }

    .stop-btn {
      background: #d93025;
    }

    .stop-btn:hover {
      background: #b3261e;
    }

    #reader {
      width: 100%;
      margin-top: 20px;
      display: none;
      min-height: 320px;
    }

    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
      display: none;
      text-align: left;
      font-size: 17px;
      word-break: break-word;
    }

    .success {
      background: #e6f4ea;
      color: #137333;
      display: block;
    }

    .error {
      background: #fce8e6;
      color: #c5221f;
      display: block;
    }

    .info {
      background: #e8f0fe;
      color: #174ea6;
      display: block;
    }

    .warning {
      background: #fff4e5;
      color: #9a6700;
      display: block;
    }

    .scan-box {
      margin-top: 16px;
      text-align: left;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
      word-break: break-word;
    }

    .small {
      font-size: 14px;
      color: #555;
      margin-top: 8px;
    }

    .counter {
      margin-top: 14px;
      font-size: 18px;
      font-weight: bold;
      color: #1a73e8;
    }

    .confirm-box {
      margin-top: 12px;
      padding: 12px;
      border: 1px dashed #f4b400;
      background: #fffdf5;
      border-radius: 10px;
      text-align: left;
      display: none;
    }

    @media (max-width: 600px) {
      h1 { font-size: 26px; }
      p { font-size: 16px; }
      button { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Barcode Attendance Scanner</h1>
    <p>Scan student ID barcode / QR and save to Google Sheet</p>

    <button class="start-btn" onclick="startScanner()">Start Scanner</button>
    <button class="stop-btn" onclick="stopScanner()">Stop Scanner</button>

    <div class="counter">Today Scanned (this session): <span id="scanCount">0</span></div>

    <div id="reader"></div>

    <div id="status" class="status"></div>

    <div id="scanValue" class="scan-box" style="display:none;"></div>

    <div id="confirmBox" class="confirm-box"></div>

    <div class="small">
      Protection enabled: the same barcode must be scanned <b>twice consecutively</b> before saving.
    </div>
  </div>

  <script>
    // =========================================================
    // IMPORTANT: KEEP YOUR APPS SCRIPT WEB APP URL HERE
    // =========================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbyYERQp0hPQsjI-pquSNC1nlaUdK5aytYBx1Zep-bBRTpFdtiBBr4NLsR_0_zLU-kVECA/exec";

    let html5QrCode;
    let scannerRunning = false;
    let scanLock = false;
    let sessionCount = 0;

    // Two-scan confirmation variables
    let pendingBarcode = null;       // first scanned barcode waiting for confirmation
    let pendingTime = null;          // time of first scan
    const CONFIRM_TIMEOUT_MS = 15000; // if second scan not done within 15 sec, reset

    function showStatus(message, type) {
      const status = document.getElementById("status");
      status.className = "status " + type;
      status.innerText = message;
      status.style.display = "block";
    }

    function showScanValue(text) {
      const box = document.getElementById("scanValue");
      box.style.display = "block";
      box.innerHTML = "<b>Scanned Barcode:</b> " + text;
    }

    function updateCount() {
      document.getElementById("scanCount").innerText = sessionCount;
    }

    function showConfirmBox(message) {
      const box = document.getElementById("confirmBox");
      box.style.display = "block";
      box.innerHTML = message;
    }

    function hideConfirmBox() {
      const box = document.getElementById("confirmBox");
      box.style.display = "none";
      box.innerHTML = "";
    }

    function normalizeBarcode(text) {
      return (text || "").toString().trim().toUpperCase();
    }

    function resetPendingScan() {
      pendingBarcode = null;
      pendingTime = null;
      hideConfirmBox();
    }

    async function startScanner() {
      if (scannerRunning) return;

      if (!API_URL || API_URL.includes("PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE")) {
        showStatus("Please set the Apps Script API URL in index.html first.", "error");
        return;
      }

      document.getElementById("reader").style.display = "block";
      html5QrCode = new Html5Qrcode("reader");

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.333
          },
          onScanSuccess,
          onScanFailure
        );

        scannerRunning = true;
        showStatus("Scanner started. Scan a barcode / QR.", "info");

      } catch (err) {
        showStatus("Camera start error: " + err, "error");
      }
    }

    async function stopScanner() {
      if (html5QrCode && scannerRunning) {
        try {
          await html5QrCode.stop();
          scannerRunning = false;
          document.getElementById("reader").style.display = "none";
          resetPendingScan();
          showStatus("Scanner stopped.", "info");
        } catch (err) {
          showStatus("Error stopping scanner: " + err, "error");
        }
      }
    }

    function onScanFailure(error) {
      // ignore repeated scan failures
    }

    async function onScanSuccess(decodedText) {
      if (scanLock) return;
      scanLock = true;

      const scanned = normalizeBarcode(decodedText);
      showScanValue(scanned);

      const now = Date.now();

      // If there is a pending first scan but it is too old, reset it
      if (pendingTime && (now - pendingTime > CONFIRM_TIMEOUT_MS)) {
        resetPendingScan();
      }

      // CASE 1: No pending barcode yet → store first scan, ask to scan again
      if (!pendingBarcode) {
        pendingBarcode = scanned;
        pendingTime = now;

        showStatus("First scan captured. Please scan the same card once again to confirm.", "warning");
        showConfirmBox(
          "<b>Waiting for confirmation scan</b><br>" +
          "First scan value: <b>" + pendingBarcode + "</b><br>" +
          "Scan the same card again within 15 seconds."
        );

        setTimeout(() => {
          scanLock = false;
        }, 1000);
        return;
      }

      // CASE 2: Second scan matches first scan → save to backend
      if (scanned === pendingBarcode) {
        const confirmedBarcode = pendingBarcode;
        resetPendingScan();

        showStatus("Confirmed. Saving attendance...", "info");

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({
              barcodeValue: confirmedBarcode
            })
          });

          const result = await response.json();

          if (result.success) {
            sessionCount++;
            updateCount();
            showStatus("Attendance saved: " + result.barcodeValue, "success");
            beepSuccess();
          } else if (result.duplicate) {
            showStatus(result.message, "error");
            beepDuplicate();
          } else {
            showStatus(result.message || "Failed to save attendance", "error");
          }

        } catch (err) {
          showStatus("Network/API error: " + err, "error");
        }

        setTimeout(() => {
          scanLock = false;
        }, 1500);
        return;
      }

      // CASE 3: Second scan does NOT match first scan → reset and ask again
      const firstValue = pendingBarcode;
      resetPendingScan();

      showStatus("Mismatch detected. Scans did not match, so nothing was saved. Please scan again from the beginning.", "error");
      showConfirmBox(
        "<b>Scan mismatch</b><br>" +
        "First scan: <b>" + firstValue + "</b><br>" +
        "Second scan: <b>" + scanned + "</b><br>" +
        "No attendance saved. Please rescan the card carefully."
      );

      setTimeout(() => {
        scanLock = false;
      }, 1500);
    }

    function beepSuccess() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = "sine";
        oscillator.frequency.value = 880;
        gainNode.gain.value = 0.1;

        oscillator.start();
        setTimeout(() => oscillator.stop(), 150);
      } catch (e) {}
    }

    function beepDuplicate() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = "square";
        oscillator.frequency.value = 300;
        gainNode.gain.value = 0.08;

        oscillator.start();
        setTimeout(() => oscillator.stop(), 250);
      } catch (e) {}
    }
  </script>
</body>
</html>

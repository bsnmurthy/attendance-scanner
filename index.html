<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Attendance Scanner</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
body{font-family:Arial;background:#f4f6f9;margin:0;padding:20px}
.container{max-width:650px;margin:auto;background:#fff;padding:20px;border-radius:15px;box-shadow:0 3px 12px rgba(0,0,0,.15)}
h1,h2{text-align:center;color:#1a73e8}
input,button{width:100%;padding:12px;font-size:16px;margin:8px 0;box-sizing:border-box}
button{border:none;border-radius:8px;color:#fff;cursor:pointer}
.login-btn,.start-btn{background:#1a73e8}
.stop-btn{background:#d93025}
#scannerPanel{display:none}
#reader{display:none;margin-top:10px}
.status{display:none;padding:10px;border-radius:8px;margin-top:10px}
.success{background:#e6f4ea;color:#137333;display:block}
.error{background:#fce8e6;color:#b00020;display:block}
.info{background:#e8f0fe;color:#174ea6;display:block}
.warning{background:#fff4e5;color:#9a6700;display:block}
.scan-box,.confirm-box{display:none;border:1px solid #ccc;padding:10px;margin-top:10px}
</style>
</head>
<body>
<div class="container">

<div id="loginPanel">
<h2>Training Attendance Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button class="login-btn" onclick="login()">Login</button>
<div id="loginStatus" class="status"></div>
</div>

<div id="scannerPanel">
<h1>Barcode Attendance Scanner</h1>
<button class="start-btn" onclick="startScanner()">Start Scanner</button>
<button class="stop-btn" onclick="stopScanner()">Stop Scanner</button>
<p>Today's Session Count : <span id="scanCount">0</span></p>
<div id="reader"></div>
<div id="status" class="status"></div>
<div id="scanValue" class="scan-box"></div>
<div id="confirmBox" class="confirm-box"></div>
</div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxnOGD31PIBABymxwQ6jpq5CFlIw0RE9nRoQTm6kUFx899V_yqHpgTNpN1kxOeT_WJOLA/exec";

let html5QrCode;
let scannerRunning=false;
let scanLock=false;
let sessionCount=0;
let pendingBarcode=null;
let pendingTime=null;
const CONFIRM_TIMEOUT_MS=15000;
const EXPECTED_LENGTH=10;

function showStatus(msg,type,target="status"){
 const s=document.getElementById(target);
 s.className="status "+type;
 s.innerHTML=msg;
 s.style.display="block";
}

async function login(){
 const username=document.getElementById("username").value.trim();
 const password=document.getElementById("password").value.trim();

 if(username==""||password==""){
   showStatus("Enter username and password","error","loginStatus");
   return;
 }

 try{
   const response=await fetch(API_URL,{
     method:"POST",
     headers:{"Content-Type":"text/plain;charset=utf-8"},
     body:JSON.stringify({
       action:"login",
       username:username,
       password:password
     })
   });

   const result=await response.json();

   if(result.success){
      document.getElementById("loginPanel").style.display="none";
      document.getElementById("scannerPanel").style.display="block";
      showStatus("Welcome "+result.username,"success");
   }else{
      showStatus(result.message,"error","loginStatus");
   }
 }catch(e){
   showStatus(e.toString(),"error","loginStatus");
 }
}

function normalizeBarcode(t){
 return (t||"").replace(/\s+/g,"").trim().toUpperCase();
}

async function startScanner(){
 if(scannerRunning)return;
 document.getElementById("reader").style.display="block";
 html5QrCode=new Html5Qrcode("reader");
 await html5QrCode.start(
   {facingMode:"environment"},
   {fps:10,qrbox:{width:250,height:250}},
   onScanSuccess,
   ()=>{}
 );
 scannerRunning=true;
 showStatus("Scanner Started","info");
}

async function stopScanner(){
 if(html5QrCode && scannerRunning){
   await html5QrCode.stop();
   scannerRunning=false;
   document.getElementById("reader").style.display="none";
   showStatus("Scanner Stopped","info");
 }
}

async function onScanSuccess(decodedText){
 if(scanLock)return;
 scanLock=true;

 const code=normalizeBarcode(decodedText);

 document.getElementById("scanValue").style.display="block";
 document.getElementById("scanValue").innerHTML="<b>Scanned :</b> "+code;

 if(code.length!=EXPECTED_LENGTH){
    showStatus("Invalid Roll Number Length","error");
    scanLock=false;
    return;
 }

 let now=Date.now();

 if(pendingTime && (now-pendingTime>CONFIRM_TIMEOUT_MS)){
    pendingBarcode=null;
 }

 if(!pendingBarcode){
    pendingBarcode=code;
    pendingTime=now;
    document.getElementById("confirmBox").style.display="block";
    document.getElementById("confirmBox").innerHTML="Scan same barcode again to confirm.";
    showStatus("First Scan Accepted","warning");
    setTimeout(()=>scanLock=false,800);
    return;
 }

 if(code!=pendingBarcode){
    pendingBarcode=null;
    showStatus("Scan Mismatch","error");
    document.getElementById("confirmBox").style.display="none";
    setTimeout(()=>scanLock=false,800);
    return;
 }

 pendingBarcode=null;
 document.getElementById("confirmBox").style.display="none";

 try{
   const response=await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({
         action:"attendance",
         barcodeValue:code
      })
   });

   const result=await response.json();

   if(result.success){
      sessionCount++;
      document.getElementById("scanCount").innerText=sessionCount;
      showStatus("Attendance Saved : "+result.barcodeValue,"success");
   }else{
      showStatus(result.message,"error");
   }

 }catch(e){
    showStatus(e.toString(),"error");
 }

 setTimeout(()=>scanLock=false,1000);
}
</script>
</body>
</html>
